<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEB Digital Business Card</title>
    <style>


        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #121212; 
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
        }



        /* 2. The Panning Background */
        .background-image {
            position: fixed;
            top: 0;
            left: 0;
            height: 100vh;
            width: 100vw;
            object-fit: cover;
            z-index: 0;
            animation: panBackground 15s linear infinite alternate;
        }

        @keyframes panBackground {
            from { transform: translateX(-30%); }
            to { transform: translateX(0%); }
        }

        /* 3. Centered Info Card Overlay */
        .screen-content {
            position: relative;
            z-index: 2;
            min-height: 60vh;
            min-width: 320px;
            max-width: 400px;
            margin: 40px auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 32px 30px 60px 30px;
            background: rgba(0, 0, 0, 0.7);
            box-sizing: border-box;
            text-align: center;
            border-radius: 24px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }

        /* 4. UI Elements */
        .logo { 
            width: 160px; 
            margin-bottom: 30px; 
        }
        
        .profile-pic {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
        }

        h1 { 
            font-size: 20px; 
            color: white; 
            margin: 0 0 8px 0; 
            font-weight: 600;
        }
        
        .title { 
            font-size: 14px; 
            color: #bbb; 
            margin: 0 0 35px 0;
            line-height: 1.5;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .button-group {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn {
            background: rgba(255, 255, 255, 0.12);
            color: white;
            text-decoration: none;
            padding: 14px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            display: flex;
            /* Center text inside the button */
            justify-content: center; 
            align-items: center;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn:hover { 
            background: rgba(255, 255, 255, 0.2); 
            transform: scale(1.02);
        }

        .footer {
            position: absolute;
            bottom: 30px;
            font-size: 10px;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>


    <img src="Example_Background.png" class="background-image" alt="Background">
    <div class="screen-content">
        <img src="SEB_logo.png" class="logo" alt="Sarawak Energy Logo">
        <img src="Example_pfp.jpg" class="profile-pic" alt="Profile">
        <h1>Abang Daanish Bin Abg Marani</h1>
        <p class="title">Corporate Business Support<br>Intern CoE</p>
        <div class="button-group">
            <a href="tel:0128496927" class="btn">Phone</a>
            <a href="mailto:AbgDaanish.AbgMarani@sarawakenergy.com.my" class="btn">Email</a>
            <a href="https://www.linkedin.com/in/abang-daanish-80973a349/" target="_blank" class="btn">LinkedIn</a>
            <a href="https://maps.google.com/?q=Sarawak+Energy+Berhad+Kuching" target="_blank" class="btn">Location</a>
        </div>
        <div class="footer">
            © 2026 SARAWAK ENERGY. ALL RIGHTS RESERVED.
        </div>
    </div>

</body>
</html>
