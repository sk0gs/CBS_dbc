<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEB Digital Business Card</title>
    <style>
        :root {
            --phone-width: 360px;
            --phone-height: 740px;
            --phone-radius: 40px;
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #121212; /* Dark background for the "desk" */
            overflow: hidden;
        }

        /* 1. The Phone Frame */
        .phone-container {
            width: var(--phone-width);
            height: var(--phone-height);
            border: 8px solid #2a2a2a;
            border-radius: var(--phone-radius);
            position: relative;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            overflow: hidden; /* Clips the background animation to the phone */
            background: #000;
        }

        /* Camera Notch */
        .phone-container::after {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 150px;
            height: 25px;
            background: #2a2a2a;
            border-bottom-left-radius: 15px;
            border-bottom-right-radius: 15px;
            z-index: 10;
        }

        /* 2. The Panning Background (Inside the Phone) */
        .background-image {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 150%; /* ScaleX 1.5f equivalent */
            object-fit: cover;
            z-index: 1;
            /* 15s slow pan as per your Kotlin code */
            animation: panBackground 15s linear infinite alternate;
        }

        @keyframes panBackground {
            from { transform: translateX(-30%); }
            to { transform: translateX(0%); }
        }

        /* 3. The Info Card Overlay */
        .screen-content {
            position: relative;
            z-index: 2;
            height: 100%;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 60px 24px 20px 24px;
            background: rgba(0, 0, 0, 0.5); /* Semi-transparent overlay */
        }

        /* 4. UI Elements */
        .logo { width: 140px; margin-bottom: 20px; }
        
        .profile-pic {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 15px;
            border: 3px solid rgba(255, 255, 255, 0.2);
        }

        h1 { font-size: 18px; color: white; text-align: center; margin-bottom: 5px; }
        
        .title { 
            font-size: 14px; 
            color: #ccc; 
            text-align: center; 
            margin-bottom: 25px;
            line-height: 1.4;
        }

        .button-group {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .btn {
            background: rgba(255, 255, 255, 0.15);
            color: white;
            text-decoration: none;
            padding: 12px 15px;
            border-radius: 10px;
            font-size: 14px;
            display: flex;
            align-items: center;
            transition: 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn:hover { background: rgba(255, 255, 255, 0.25); }

        .footer {
            margin-top: auto;
            font-size: 10px;
            color: rgba(255, 255, 255, 0.4);
            padding-bottom: 10px;
        }
    </style>
</head>
<body>

    <div class="phone-container">
        <img src="tmp_7fa7c2f3-7458-464e-beba-e044f35924fc.png" class="background-image" alt="Background">

            <div class="button-group">

            </div>
        </div>
    </div>

</body>
</html>
