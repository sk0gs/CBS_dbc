<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEB Digital Business Card</title>
    <style>
        :root {
            --phone-width: 360px;
            --phone-height: 740px;
            --phone-radius: 40px;
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #121212; 
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
        }

        /* 1. The Phone Frame */
        .phone-container {
            width: var(--phone-width);
            height: var(--phone-height);
            border: 8px solid #2a2a2a;
            border-radius: var(--phone-radius);
            position: relative;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            overflow: hidden; 
            background: #000;
        }

        /* Camera Notch */
        .phone-container::after {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 150px;
            height: 25px;
            background: #2a2a2a;
            border-bottom-left-radius: 15px;
            border-bottom-right-radius: 15px;
            z-index: 10;
        }

        /* 2. The Panning Background */
        .background-image {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 150%; 
            object-fit: cover;
            z-index: 1;
            animation: panBackground 15s linear infinite alternate;
        }

        @keyframes panBackground {
            from { transform: translateX(-30%); }
            to { transform: translateX(0%); }
        }

        /* 3. Centered Info Card Overlay */
        .screen-content {
            position: relative;
            z-index: 2;
            height: 100%;
            width: 100%;
            display: flex;
            flex-direction: column;
            /* Center elements horizontally and vertically */
            align-items: center;
            justify-content: center; 
            padding: 0 30px;
            background: rgba(0, 0, 0, 0.6); 
            box-sizing: border-box;
            text-align: center; /* Ensures text blocks are centered */
        }

        /* 4. UI Elements */
        .logo { 
            width: 160px; 
            margin-bottom: 30px; 
        }
        
        .profile-pic {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
        }

        h1 { 
            font-size: 20px; 
            color: white; 
            margin: 0 0 8px 0; 
            font-weight: 600;
        }
        
        .title { 
            font-size: 14px; 
            color: #bbb; 
            margin: 0 0 35px 0;
            line-height: 1.5;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .button-group {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn {
            background: rgba(255, 255, 255, 0.12);
            color: white;
            text-decoration: none;
            padding: 14px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            display: flex;
            /* Center text inside the button */
            justify-content: center; 
            align-items: center;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn:hover { 
            background: rgba(255, 255, 255, 0.2); 
            transform: scale(1.02);
        }

        .footer {
            position: absolute;
            bottom: 30px;
            font-size: 10px;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

    <div class="phone-container">
        <img src="tmp_7fa7c2f3-7458-464e-beba-e044f35924fc.png" class="background-image" alt="Background">

        <div class="screen-content">
            <img src="Centenary-Watermark.png" class="logo" alt="Sarawak Energy Logo">
            
            <img src="pfp.jpg" class="profile-pic" alt="Profile">
            
            <h1>Abang Daanish Bin Abg Marani</h1>
            <p class="title">Corporate Business Support<br>Intern CoE</p>

            <div class="button-group">
                <a href="tel:0128496927" class="btn">Phone</a>
                <a href="mailto:AbgDaanish.AbgMarani@sarawakenergy.com.my" class="btn">Email</a>
                <a href="https://www.linkedin.com/in/abang-daanish-80973a349/" target="_blank" class="btn">LinkedIn</a>
                <a href="https://maps.google.com/?q=Sarawak+Energy+Berhad+Kuching" target="_blank" class="btn">Location</a>
            </div>

            <div class="footer">
                © 2026 SARAWAK ENERGY. ALL RIGHTS RESERVED.
            </div>
        </div>
    </div>

</body>
</html>
